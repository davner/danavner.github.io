<!doctype html>
<html lang="en" class="pico-background-grey-950">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/pico.sand.min.css">
    <link rel="stylesheet" href="css/pico.colors.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/feather.min.js"></script>
    <title>Dan Avner</title>
  </head>

  <body>
    <header class="container-fluid pico-background-grey-900">
      <nav class="container">
        <ul></ul>
        <ul class="nav-icons">
          <li><a aria-label="GitHub" title="GitHub" href="https://github.com/davner"><i data-feather="github"></i></a></li>
          <li><a aria-label="LinkedIn" title="LinkedIn" href="https://www.linkedin.com/in/danavner/"><i data-feather="linkedin"></i></a></li>
          <li><a aria-label="Instagram" title="Instagram" href="https://www.instagram.com/aspacemansheavyload/"><i data-feather="instagram"></i></a></li>
          <li><a aria-label="Email" title="Email" href="mailto:ldpavner@gmail.com"><i data-feather="send"></i></a></li>
        </ul>
        <ul></ul>
      </nav>
    </header>

    <main class="container">
      <section class="hero">
        <img
          id="hero-photo"
          src="img/me1.jpg"
          alt="Dan Avner"
          class="hero-photo"
        />

        <h1>Hi, I'm Dan Avner.</h1>
        <p>
          I build production-quality software for telescopes and astronomers.
        </p>
        <a href="mailto:ldpavner@gmail.com" role="button">
          <i data-feather="send"></i> Get in touch
        </a>
      </section>

      <section class="mt-3">
        <p>
          <i data-feather="tool"></i>
          More coming soon.
        </p>

        <p>
          This space is under construction:
          projects, writing, and other things I probably will overthink.
        </p>
      </section>
    </main>

    <script>
      feather.replace({ width: "1em", height: "1em" });
      const images = ["img/me1.jpg", "img/me2.jpg"];
      let index = 0;

      const photo = document.getElementById("hero-photo");

      setInterval(() => {
        index = (index + 1) % images.length;
        photo.style.opacity = "0";

        setTimeout(() => {
          photo.src = images[index];
          photo.style.opacity = "1";
        }, 100);
      }, 700);
    </script>
  </body>
</html>
